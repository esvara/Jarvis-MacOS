name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Print toolchain versions
        run: |
          node -v
          npm -v
          swift --version
          xcodebuild -version

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build sidecar
        run: npm run build:sidecar

      - name: Build voice runtime
        run: npm run build:voice

      - name: Build Swift target
        run: swift build

      - name: Run public repo checks
        run: npm run check:public
